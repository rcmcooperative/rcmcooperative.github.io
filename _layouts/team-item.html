---
layout: default
---
{% include nav.html %}

<div id="pagecontainer">
  <section class="page-section" id="team-item">
    <div class="container">
      <div class="row">
        <div class="col-lg-8 mx-auto">
          <img class="img-fluid d-block mx-auto mb-4" src="{{ page.image | relative_url }}" alt="{{ page.alt }}">

          <h1 class="text-uppercase text-center">{{ page.title }}</h1>

          {% if page.pronouns %}
            <p class="item-intro text-muted small text-center">({{ page.pronouns }})</p>
          {% endif %}

          {% if page.subtitle %}
            <p class="item-intro text-muted text-center">{{ page.subtitle }}</p>
          {% endif %}

          {{ content }}

          {% if page.social %}
            <ul class="list-inline social-buttons text-center mb-4">
              {% for social_link in page.social %}
              <li class="list-inline-item mx-2">
                <a href="{{ social_link.url }}" target="_blank" rel="noopener noreferrer">
                  <i class="{{ social_link.icon }}"></i>
                </a>
              </li>
              {% endfor %}
            </ul>
          {% endif %}
        </div>
      </div>
    </div>
  </section>
</div>
